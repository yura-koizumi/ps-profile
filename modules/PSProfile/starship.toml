"$schema" = 'https://starship.rs/config-schema.json'

# ─────────────────────────────────────────────────────────────
#  PSProfile starship preset
#  - Nerd Font / Powerline 非依存 (どのモノスペースフォントでも崩れない)
#  - 汎用 Unicode (❯ ▎ ✓ ✗ ⇡ ⇣ など) と色のみで構造化
#  - tokyo-night パレット
#  - 2 行レイアウト: [情報行] / [プロンプト記号]
# ─────────────────────────────────────────────────────────────

add_newline = true
palette = 'tokyo_night'

format = """
[▎](fg:purple)$username[@](fg:muted)$hostname \
$directory\
$git_branch$git_status$git_state\
$cmd_duration\
$fill\
$nodejs$python$rust$golang$java$dotnet$docker_context\
$time
$character"""

right_format = ""

# ── パレット ─────────────────────────────────────────────────
[palettes.tokyo_night]
fg     = '#c0caf5'
muted  = '#565f89'
blue   = '#7aa2f7'
cyan   = '#7dcfff'
green  = '#9ece6a'
orange = '#ff9e64'
purple = '#bb9af7'
red    = '#f7768e'
yellow = '#e0af68'

# ── 識別子 ───────────────────────────────────────────────────
[username]
show_always = true
style_user  = 'bold fg:purple'
style_root  = 'bold fg:red'
format      = '[$user]($style)'

[hostname]
ssh_only = false
style    = 'fg:cyan'
format   = '[$hostname]($style)'
trim_at  = '.'

# ── カレントディレクトリ ─────────────────────────────────────
[directory]
style             = 'bold fg:blue'
format            = ' [$path]($style)[$read_only]($read_only_style) '
truncation_length = 4
truncation_symbol = '…/'
truncate_to_repo  = true
home_symbol       = '~'
read_only         = ' (ro)'
read_only_style   = 'fg:red'

# 端末固有のディレクトリ置換は ~/.psprofile/user-config.ps1 で行う想定

# ── Git ──────────────────────────────────────────────────────
[git_branch]
symbol            = ''
style             = 'fg:green'
truncation_length = 24
truncation_symbol = '…'
only_attached     = true
format            = '[on ](fg:muted)[$branch]($style) '

[git_status]
style      = 'fg:yellow'
conflicted = '[≠${count}](fg:red) '
ahead      = '[⇡${count}](fg:green) '
behind     = '[⇣${count}](fg:yellow) '
diverged   = '[⇕⇡${ahead_count}⇣${behind_count}](fg:orange) '
untracked  = '[?${count}](fg:muted) '
stashed    = '[*](fg:cyan) '
modified   = '[!${count}](fg:yellow) '
staged     = '[+${count}](fg:green) '
renamed    = '[»${count}](fg:cyan) '
deleted    = '[✘${count}](fg:red) '
format     = '$all_status$ahead_behind'

[git_state]
style  = 'fg:orange'
format = '[\($state $progress_current/$progress_total\)]($style) '

# ── 言語 / ツール (簡素、色のみ) ─────────────────────────────
[nodejs]
symbol = 'node '
style  = 'fg:green'
format = '[$symbol$version]($style) '

[python]
symbol = 'py '
style  = 'fg:yellow'
format = '[$symbol$version( \($virtualenv\))]($style) '

[rust]
symbol = 'rust '
style  = 'fg:orange'
format = '[$symbol$version]($style) '

[golang]
symbol = 'go '
style  = 'fg:cyan'
format = '[$symbol$version]($style) '

[java]
symbol = 'java '
style  = 'fg:red'
format = '[$symbol$version]($style) '

[dotnet]
symbol    = '.NET '
style     = 'fg:purple'
heuristic = true
format    = '[$symbol($version)]($style) '

[docker_context]
symbol = 'docker '
style  = 'fg:blue'
format = '[$symbol$context]($style) '

# ── 実行時間 ─────────────────────────────────────────────────
[cmd_duration]
min_time          = 2000
show_milliseconds = false
style             = 'fg:yellow'
format            = '[took $duration]($style) '

# ── 右端時刻 ─────────────────────────────────────────────────
[time]
disabled    = false
time_format = '%H:%M:%S'
style       = 'fg:muted'
format      = '[$time]($style)'

[fill]
symbol = ' '
style  = 'fg:muted'

# ── プロンプト記号 ───────────────────────────────────────────
[character]
success_symbol            = '[❯](bold fg:green)'
error_symbol              = '[❯](bold fg:red)'
vimcmd_symbol             = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:purple)'
vimcmd_replace_symbol     = '[❮](bold fg:purple)'
vimcmd_visual_symbol      = '[❮](bold fg:yellow)'

# ── 無効化モジュール (高速化) ────────────────────────────────
[os]
disabled = true
[package]
disabled = true
[terraform]
disabled = true
[azure]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = true
[memory_usage]
disabled = true
